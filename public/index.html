<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>AutoBattle.io</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#231F20; display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; font-family:'Segoe UI',sans-serif; touch-action:none; }
    #unity-container { position:relative; width:100vw; max-height:100vh; aspect-ratio:16/9; }
    @media (min-aspect-ratio:16/9) { #unity-container { width:calc(100vh*(16/9)); height:100vh; } }
    #unity-canvas { width:100%; height:100%; display:block; outline:none; }

    /* 로딩 */
    #loading-screen { position:absolute; left:0; top:0; width:100%; height:100%; background:#231F20; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; z-index:10; }
    #loading-text { font-size:24px; margin-bottom:20px; font-weight:bold; }
    #progress-bar-bg { width:250px; height:12px; background:#444; border-radius:6px; overflow:hidden; }
    #progress-bar-fill { width:0%; height:100%; background:#fff; transition:width 0.1s; }

    /* 클래스 선택 오버레이 */
    #class-select { position:absolute; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:20; }
    #class-select h1 { color:#ffd700; font-size:32px; margin-bottom:30px; text-shadow:2px 2px 4px #000; }
    .class-btn { width:380px; padding:16px 20px; margin:8px; border:2px solid #555; border-radius:10px; background:linear-gradient(135deg,#2d3436,#636e72); color:#fff; font-size:16px; cursor:pointer; transition:all 0.2s; text-align:left; }
    .class-btn:hover { border-color:#ffd700; background:linear-gradient(135deg,#636e72,#2d3436); transform:scale(1.03); }
    .class-btn .name { font-size:20px; font-weight:bold; color:#ffd700; }
    .class-btn .stats { font-size:13px; color:#aaa; margin-top:4px; }
    .class-btn .desc { font-size:14px; color:#ddd; margin-top:4px; }

    /* 하단 메뉴바 */
    #bottom-bar { position:absolute; bottom:0; left:0; width:100%; height:48px; background:rgba(0,0,0,0.85); display:none; z-index:15; border-top:1px solid #444; }
    #bottom-bar .tab { flex:1; height:100%; border:none; background:transparent; color:#ccc; font-size:13px; cursor:pointer; transition:all 0.15s; border-right:1px solid #333; }
    #bottom-bar .tab:hover { background:rgba(255,255,255,0.1); color:#fff; }
    #bottom-bar .tab:active { background:rgba(255,215,0,0.2); }
    #bottom-bar { display:none; /* 게임 시작 전 숨김 */ }
    #bottom-bar.show { display:flex; }

    /* 화폐 표시 */
    #currency-bar { position:absolute; bottom:52px; left:10px; color:#fff; font-size:14px; z-index:15; display:none; text-shadow:1px 1px 2px #000; }
    #currency-bar.show { display:block; }
    #currency-bar span { margin-right:15px; }
    .diamond { color:#44aaff; }
    .gold { color:#ffd700; }

    /* 패널 */
    .panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:450px; max-height:70vh; background:rgba(20,20,30,0.95); border:2px solid #555; border-radius:12px; color:#fff; z-index:25; display:none; overflow-y:auto; }
    .panel.show { display:block; }
    .panel-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #444; background:rgba(255,215,0,0.1); border-radius:10px 10px 0 0; }
    .panel-header h2 { font-size:18px; color:#ffd700; }
    .panel-close { background:none; border:none; color:#aaa; font-size:20px; cursor:pointer; }
    .panel-close:hover { color:#fff; }
    .panel-body { padding:12px 16px; }
    .panel-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #333; }
    .panel-item:last-child { border-bottom:none; }
    .panel-item .name { flex:1; }
    .panel-item button { padding:6px 14px; border:1px solid #555; border-radius:6px; background:#2d3436; color:#fff; cursor:pointer; font-size:12px; }
    .panel-item button:hover { background:#ffd700; color:#000; }

    /* 알림 메시지 */
    #toast { position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#ffd700; padding:10px 24px; border-radius:8px; z-index:30; display:none; font-size:15px; border:1px solid #ffd700; }
    #toast.show { display:block; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>

    <div id="loading-screen">
      <div id="loading-text">AutoBattle.io 로딩 중...</div>
      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>

    <!-- 클래스 선택 -->
    <div id="class-select">
      <h1>AutoBattle.io</h1>
      <button class="class-btn" onclick="selectClass('Assassin')">
        <div class="name">Assassin [어쌔신]</div>
        <div class="stats">HP:120 / ATK:45 / SPD:22 / CRIT:25%</div>
        <div class="desc">빠른 속도와 높은 크리티컬로 적을 암살하는 암살자</div>
      </button>
      <button class="class-btn" onclick="selectClass('Warrior')">
        <div class="name">Warrior [워리어]</div>
        <div class="stats">HP:180 / ATK:30 / DEF:15 / SPD:12</div>
        <div class="desc">균형 잡힌 공방으로 안정적인 전투를 하는 전사</div>
      </button>
      <button class="class-btn" onclick="selectClass('Knight')">
        <div class="name">Knight [나이트]</div>
        <div class="stats">HP:300 / ATK:15 / DEF:30 / SPD:10</div>
        <div class="desc">철벽 방어로 아군을 지키는 탱커</div>
      </button>
      <button class="class-btn" onclick="selectClass('Mage')">
        <div class="name">Mage [메이지]</div>
        <div class="stats">HP:90 / ATK:10 / DEF:5 / SPD:9</div>
        <div class="desc">강력한 광역 마법으로 전장을 지배하는 마법사</div>
      </button>
    </div>

    <!-- 하단 메뉴바 -->
    <div id="bottom-bar">
      <button class="tab" onclick="togglePanel('shop')">상점</button>
      <button class="tab" onclick="togglePanel('market')">거래소</button>
      <button class="tab" onclick="togglePanel('inventory')">인벤토리</button>
      <button class="tab" onclick="togglePanel('units')">유닛</button>
      <button class="tab" onclick="togglePanel('quests')">퀘스트</button>
      <button class="tab" onclick="togglePanel('ranking')">랭킹</button>
      <button class="tab" onclick="claimDaily()">일일보상</button>
    </div>

    <!-- 화폐 표시 -->
    <div id="currency-bar">
      <span class="diamond">Diamond: <b id="diamond-val">100</b></span>
      <span class="gold">Gold: <b id="gold-val">0</b>G</span>
    </div>

    <!-- 알림 -->
    <div id="toast"></div>

    <!-- 상점 패널 -->
    <div class="panel" id="panel-shop">
      <div class="panel-header"><h2>상점</h2><button class="panel-close" onclick="closePanel('shop')">X</button></div>
      <div class="panel-body" id="shop-body"></div>
    </div>

    <!-- 거래소 패널 -->
    <div class="panel" id="panel-market">
      <div class="panel-header"><h2>거래소 (수수료 5%)</h2><button class="panel-close" onclick="closePanel('market')">X</button></div>
      <div class="panel-body" id="market-body"><p style="color:#888">등록된 물건이 없습니다</p></div>
    </div>

    <!-- 인벤토리 패널 -->
    <div class="panel" id="panel-inventory">
      <div class="panel-header"><h2>인벤토리</h2><button class="panel-close" onclick="closePanel('inventory')">X</button></div>
      <div class="panel-body" id="inventory-body"><p style="color:#888">비어있습니다</p></div>
    </div>

    <!-- 유닛 패널 -->
    <div class="panel" id="panel-units">
      <div class="panel-header"><h2>유닛 관리</h2><button class="panel-close" onclick="closePanel('units')">X</button></div>
      <div class="panel-body" id="units-body"><p style="color:#888">용병이 없습니다</p></div>
    </div>

    <!-- 퀘스트 패널 -->
    <div class="panel" id="panel-quests">
      <div class="panel-header"><h2>퀘스트</h2><button class="panel-close" onclick="closePanel('quests')">X</button></div>
      <div class="panel-body" id="quests-body"><p style="color:#888">로딩 중...</p></div>
    </div>

    <!-- 랭킹 패널 -->
    <div class="panel" id="panel-ranking">
      <div class="panel-header"><h2>랭킹</h2><button class="panel-close" onclick="closePanel('ranking')">X</button></div>
      <div class="panel-body" id="ranking-body"><p style="color:#888">로딩 중...</p></div>
    </div>
  </div>

  <script src="Build/WebBuild.loader.js"></script>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loadingScreen = document.querySelector("#loading-screen");
    var progressBarFill = document.querySelector("#progress-bar-fill");
    var classSelect = document.querySelector("#class-select");
    var bottomBar = document.querySelector("#bottom-bar");
    var currencyBar = document.querySelector("#currency-bar");
    var gameStarted = false;
    var deviceId = localStorage.getItem('deviceId') || (()=>{ var id='dev_'+Math.random().toString(36).substr(2,9); localStorage.setItem('deviceId',id); return id; })();

    var config = {
      dataUrl: "Build/WebBuild.data",
      frameworkUrl: "Build/WebBuild.framework.js",
      codeUrl: "Build/WebBuild.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "AutoBattle.io",
      productVersion: "1.0",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: window.devicePixelRatio
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.head.appendChild(meta);
    }

    createUnityInstance(canvas, config, (progress) => {
      progressBarFill.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {
      loadingScreen.style.display = "none";
      window.myUnityInstance = unityInstance;
      // 소켓 연결 후 클래스 선택 화면 표시
      waitForSocket();
    }).catch((msg) => {
      document.querySelector("#loading-text").innerText = "로딩 에러: " + msg;
    });

    function waitForSocket() {
      if (window.socket && window.socket.connected) {
        classSelect.style.display = "flex";
        setupSocketListeners();
      } else {
        setTimeout(waitForSocket, 500);
      }
    }

    function selectClass(className) {
      if (gameStarted) return;
      gameStarted = true;
      classSelect.style.display = "none";
      bottomBar.classList.add("show");
      currencyBar.classList.add("show");
      // Unity에 init_request 전송
      window.socket.emit('init_request', JSON.stringify({ className, deviceId }));
    }

    function setupSocketListeners() {
      window.socket.on('sync', (data) => {
        // 내 데이터에서 화폐 업데이트
        for (var pid in data.players) {
          var p = data.players[pid];
          if (p.diamonds !== undefined) document.getElementById('diamond-val').textContent = p.diamonds;
          if (p.gold !== undefined) document.getElementById('gold-val').textContent = p.gold;
        }
      });

      window.socket.on('shop_result', (d) => showToast(d.msg));
      window.socket.on('market_result', (d) => showToast(d.msg));
      window.socket.on('daily_result', (d) => { showToast(d.msg); if(d.diamonds) document.getElementById('diamond-val').textContent=d.diamonds; });
      window.socket.on('quest_result', (d) => showToast(d.msg));
      window.socket.on('unit_result', (d) => showToast(d.msg));
      window.socket.on('equip_result', (d) => showToast(d.msg));

      window.socket.on('inventory_data', renderInventory);
      window.socket.on('market_data', renderMarket);
      window.socket.on('market_update', renderMarket);
      window.socket.on('quest_data', renderQuests);
      window.socket.on('unit_data', renderUnits);
      window.socket.on('ranking_data', renderRanking);

      window.socket.on('player_die', (d) => {
        // 내가 죽으면 클래스 선택 다시 표시
        // Unity 측에서 처리하므로 여기서는 패스
      });
    }

    // 상점 아이템
    var shopItems = [
      {id:'exp_boost', name:'EXP 2배 (5분)', price:'50 Diamond', cmd:'shop_buy'},
      {id:'gold_boost', name:'골드 2배 (5분)', price:'50 Diamond', cmd:'shop_buy'},
      {id:'hp_potion_big', name:'상급 HP물약 x10', price:'30 Diamond', cmd:'shop_buy'},
      {id:'skin_golden', name:'황금 오라 스킨', price:'300 Diamond', cmd:'shop_buy'},
      {id:'skin_shadow', name:'그림자 스킨', price:'300 Diamond', cmd:'shop_buy'},
      {id:'skin_flame', name:'화염 스킨', price:'500 Diamond', cmd:'shop_buy'},
      {id:'inventory_expand', name:'용병 슬롯 +5', price:'200 Diamond', cmd:'shop_buy'},
      {id:'hp_potion_s', name:'하급 HP물약 x10', price:'100 Gold', cmd:'shop_buy'},
      {id:'hp_potion_m', name:'중급 HP물약 x10', price:'300 Gold', cmd:'shop_buy'},
      {id:'atk_boost', name:'공격 부스터 (1분)', price:'500 Gold', cmd:'shop_buy'},
      {id:'town_scroll', name:'귀환 주문서', price:'200 Gold', cmd:'shop_buy'},
    ];

    function togglePanel(name) {
      var panel = document.getElementById('panel-' + name);
      var isVisible = panel.classList.contains('show');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
      if (!isVisible) {
        panel.classList.add('show');
        if (name === 'shop') renderShop();
        else if (name === 'market') window.socket.emit('market_list','{}');
        else if (name === 'inventory') window.socket.emit('get_inventory','{}');
        else if (name === 'units') window.socket.emit('get_units','{}');
        else if (name === 'quests') window.socket.emit('get_quests','{}');
        else if (name === 'ranking') window.socket.emit('get_ranking','{}');
      }
    }

    function closePanel(name) { document.getElementById('panel-'+name).classList.remove('show'); }

    function claimDaily() { window.socket.emit('daily_reward','{}'); }

    function renderShop() {
      var html = '';
      shopItems.forEach(item => {
        html += '<div class="panel-item"><span class="name">'+item.name+'</span><button onclick="window.socket.emit(\'shop_buy\',\''+item.id+'\')">'+item.price+'</button></div>';
      });
      document.getElementById('shop-body').innerHTML = html;
    }

    function renderMarket(data) {
      var body = document.getElementById('market-body');
      if (!data.listings || data.listings.length === 0) { body.innerHTML = '<p style="color:#888">등록된 물건이 없습니다</p>'; return; }
      var html = '';
      data.listings.forEach(l => {
        html += '<div class="panel-item"><span class="name">'+l.itemName+' <small style="color:#888">by '+l.sellerName+'</small></span><button onclick="window.socket.emit(\'market_buy\','+l.id+')">'+l.price+'G</button></div>';
      });
      body.innerHTML = html;
    }

    function renderInventory(data) {
      var body = document.getElementById('inventory-body');
      var inv = data.inventory || {};
      var items = data.items || {};
      var keys = Object.keys(inv);
      if (keys.length === 0) { body.innerHTML = '<p style="color:#888">비어있습니다</p>'; return; }
      var html = '';
      keys.forEach(k => {
        var name = items[k] ? items[k].name : k;
        html += '<div class="panel-item"><span class="name">'+name+' x'+inv[k]+'</span><button onclick="sellItem(\''+k+'\')">판매등록</button></div>';
      });
      body.innerHTML = html;
    }

    function sellItem(itemId) {
      var price = prompt('판매 가격 (Gold):', '100');
      if (price) window.socket.emit('market_sell', JSON.stringify({itemId, price: parseInt(price)}));
    }

    function renderUnits(data) {
      var body = document.getElementById('units-body');
      var units = data.units || [];
      if (units.length === 0) { body.innerHTML = '<p style="color:#888">용병이 없습니다</p>'; return; }
      var html = '<p style="color:#aaa;margin-bottom:8px">보유: '+units.length+'/'+data.maxArmy+'</p>';
      units.forEach(u => {
        html += '<div class="panel-item"><span class="name">Lv.'+u.level+' '+u.displayName+' <small style="color:#888">HP:'+Math.ceil(u.hp)+'/'+Math.ceil(u.maxHp)+'</small></span><button onclick="window.socket.emit(\'dismiss_unit\',\''+u.id+'\')">해고</button></div>';
      });
      body.innerHTML = html;
    }

    function renderQuests(data) {
      var body = document.getElementById('quests-body');
      var quests = data.quests || {};
      var progress = data.progress || {};
      var completed = data.completed || {};
      var html = '';
      Object.entries(quests).forEach(([qId, q]) => {
        var prog = progress[qId] || 0;
        var done = !!completed[qId];
        var canClaim = prog >= q.goal && !done;
        var statusColor = done ? '#44ff44' : (canClaim ? '#ffd700' : '#aaa');
        html += '<div class="panel-item"><span class="name">'+q.name+'<br><small style="color:#888">'+q.desc+'</small></span><span style="color:'+statusColor+';min-width:70px;text-align:right">'+(done?'완료':prog+'/'+q.goal)+'</span>';
        if (canClaim) html += '<button onclick="window.socket.emit(\'quest_claim\',\''+qId+'\');" style="margin-left:8px">수령</button>';
        html += '</div>';
      });
      body.innerHTML = html;
    }

    function renderRanking(data) {
      var body = document.getElementById('ranking-body');
      var html = '<h3 style="color:#ffd700;margin-bottom:8px">레벨 랭킹</h3>';
      (data.level||[]).forEach((r,i) => { html += '<div style="padding:4px 0;color:#ddd">'+(i+1)+'. Lv.'+r.level+' '+r.name+' ('+r.className+')</div>'; });
      html += '<h3 style="color:#ff6b6b;margin:12px 0 8px">PvP 랭킹</h3>';
      (data.pvp||[]).forEach((r,i) => { html += '<div style="padding:4px 0;color:#ddd">'+(i+1)+'. '+r.kills+'킬 '+r.name+'</div>'; });
      body.innerHTML = html;
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
