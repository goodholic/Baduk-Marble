<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>Unity WebGL Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <style>
      /* 화면 배경을 검게 하고, 컨테이너를 화면 정중앙에 배치 */
      body { 
        padding: 0; 
        margin: 0; 
        overflow: hidden; 
        background-color: #231F20; 
        touch-action: none; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        width: 100vw;
      }
      
      /* 1920x1080 (16:9) 가로 비율을 강제 유지하며 브라우저 크기에 맞게 자동 축소/확대 */
      #unity-container {
        position: relative;
        width: 100vw;
        max-height: 100vh;
        aspect-ratio: 16 / 9;
      }
      
      /* 브라우저가 가로로 너무 긴 경우 (울트라와이드 모니터 등) 높이에 맞춰 너비를 제한 */
      @media (min-aspect-ratio: 16/9) {
        #unity-container {
          width: calc(100vh * (16 / 9));
          height: 100vh;
        }
      }

      #unity-canvas { width: 100%; height: 100%; display: block; outline: none; }
      
      /* 접속 즉시 보여질 로딩 화면 스타일 */
      #loading-screen {
        position: absolute; left: 0; top: 0; width: 100%; height: 100%;
        background-color: #231F20;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; z-index: 10;
      }
      #loading-text { font-size: 24px; margin-bottom: 20px; font-weight: bold; }
      #progress-bar-bg { width: 250px; height: 12px; background-color: #444; border-radius: 6px; overflow: hidden; }
      #progress-bar-fill { width: 0%; height: 100%; background-color: #fff; transition: width 0.1s ease; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>
      
      <div id="loading-screen">
        <div id="loading-text">게임을 불러오는 중...</div>
        <div id="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
      </div>
    </div>
    
    <script src="Build/WebGLBuild.loader.js"></script>
    
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingScreen = document.querySelector("#loading-screen");
      var progressBarFill = document.querySelector("#progress-bar-fill");

      var config = {
        dataUrl: "Build/WebGLBuild.data",
        frameworkUrl: "Build/WebGLBuild.framework.js",
        codeUrl: "Build/WebGLBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "1.0",
        matchWebGLToCanvasSize: true, // 캔버스 크기를 브라우저(CSS 비율)에 맞춤
        devicePixelRatio: window.devicePixelRatio // 모바일 화면 선명도 유지
      };

      // 모바일 환경일 경우 뷰포트 메타 태그를 동적으로 한 번 더 확실히 적용
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      // 유니티 인스턴스 생성 및 onProgress 콜백을 통해 로딩바 애니메이션 처리
      createUnityInstance(canvas, config, (progress) => {
        // 다운로드 진행률(0.0 ~ 1.0)에 따라 하얀색 로딩바를 채움
        progressBarFill.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        // 로딩이 100% 완료되면 검은 로딩 화면을 숨김
        loadingScreen.style.display = "none";
        
        // [핵심] 유니티 빌드 완료 시 자동으로 소켓 연결용 변수가 세팅됩니다!
        window.myUnityInstance = unityInstance;
        console.log("유니티 웹 빌드 실행 및 소켓 연결 준비 완료!");
      }).catch((message) => {
        console.error("유니티 로딩 에러:", message);
        document.querySelector("#loading-text").innerText = "로딩 중 에러가 발생했습니다.";
      });
    </script>
  </body>
</html>
